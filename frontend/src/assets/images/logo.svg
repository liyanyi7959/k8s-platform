<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0" y1="4" x2="32" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- 外层：圆角六边形科技底框 -->
  <path d="M16 1.5 L28.5 8.7 Q30 9.6 30 11.2 V20.8 Q30 22.4 28.5 23.3 L16 30.5 L3.5 23.3 Q2 22.4 2 20.8 V11.2 Q2 9.6 3.5 8.7 Z"
        fill="url(#sg)" opacity="0.12"/>
  <path d="M16 1.5 L28.5 8.7 Q30 9.6 30 11.2 V20.8 Q30 22.4 28.5 23.3 L16 30.5 L3.5 23.3 Q2 22.4 2 20.8 V11.2 Q2 9.6 3.5 8.7 Z"
        fill="none" stroke="url(#sg)" stroke-width="0.8" opacity="0.35"/>

  <!-- 中层：枢纽节点网络 — 6个外围节点 + 连线 -->
  <g opacity="0.3" stroke="url(#sg2)" stroke-width="0.5">
    <line x1="16" y1="16" x2="16" y2="6"/>
    <line x1="16" y1="16" x2="24.5" y2="11"/>
    <line x1="16" y1="16" x2="24.5" y2="21"/>
    <line x1="16" y1="16" x2="16" y2="26"/>
    <line x1="16" y1="16" x2="7.5" y2="21"/>
    <line x1="16" y1="16" x2="7.5" y2="11"/>
  </g>
  <g fill="url(#sg2)" opacity="0.6">
    <circle cx="16" cy="6" r="1.2"/>
    <circle cx="24.5" cy="11" r="1.2"/>
    <circle cx="24.5" cy="21" r="1.2"/>
    <circle cx="16" cy="26" r="1.2"/>
    <circle cx="7.5" cy="21" r="1.2"/>
    <circle cx="7.5" cy="11" r="1.2"/>
  </g>

  <!-- 核心：终端提示符 >_ （Linux技术标识） -->
  <g transform="translate(9, 10.5)">
    <!-- > 符号 -->
    <path d="M0 0 L5 3.5 L0 7" fill="none" stroke="url(#sg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- _ 光标 -->
    <line x1="7" y1="7" x2="13" y2="7" stroke="url(#sg2)" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 中心枢纽亮点 -->
  <circle cx="16" cy="16" r="1.8" fill="url(#sg)" opacity="0.5"/>
</svg>
