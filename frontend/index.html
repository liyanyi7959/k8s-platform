<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星枢K8S管理平台</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/logo.svg" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph -->
    <meta property="og:title" content="星枢K8S管理平台" />
    <meta property="og:description" content="聚焦集群接入、资源编排、权限审计与运行观测的 K8S 管理平台" />
    <meta property="og:type" content="website" />

    <script>
      ;(() => {
        try {
          const key = 'k8s-platform:theme'
          const saved = localStorage.getItem(key) || 'light'
          const effective = saved === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : saved
          document.documentElement.classList.toggle('dark', effective === 'dark')
        } catch {
        }
      })()
    </script>

    <!-- Splash screen: 品牌化启动页，路由 ready 后淡出 -->
    <style>
      :root {
        color-scheme: light;
      }

      html.dark {
        color-scheme: dark;
      }

      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(780px 520px at 10% 0%, rgba(34, 211, 238, 0.16), transparent 58%),
          radial-gradient(860px 580px at 100% 0%, rgba(129, 140, 248, 0.18), transparent 56%),
          radial-gradient(820px 540px at 74% 100%, rgba(96, 165, 250, 0.14), transparent 58%),
          linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
        transition: opacity 0.42s ease, visibility 0.42s ease;
      }

      html.dark #app-splash {
        background:
          radial-gradient(780px 520px at 10% 0%, rgba(34, 211, 238, 0.12), transparent 58%),
          radial-gradient(860px 580px at 100% 0%, rgba(129, 140, 248, 0.16), transparent 56%),
          radial-gradient(820px 540px at 74% 100%, rgba(59, 130, 246, 0.12), transparent 58%),
          linear-gradient(180deg, #0b1220 0%, #0f172a 100%);
      }

      #app-splash.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #app-splash::before,
      #app-splash::after {
        content: '';
        position: absolute;
        border-radius: 999px;
        filter: blur(22px);
        opacity: 0.7;
        animation: splash-orbit 12s ease-in-out infinite alternate;
      }

      #app-splash::before {
        width: 280px;
        height: 280px;
        left: 10%;
        top: 14%;
        background: rgba(34, 211, 238, 0.18);
      }

      #app-splash::after {
        width: 320px;
        height: 320px;
        right: 8%;
        bottom: 10%;
        background: rgba(129, 140, 248, 0.2);
        animation-duration: 15s;
      }

      .app-splash-shell {
        position: relative;
        width: min(540px, calc(100vw - 40px));
        padding: 32px 34px 28px;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow:
          0 24px 90px rgba(15, 23, 42, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(18px);
      }

      html.dark .app-splash-shell {
        border-color: rgba(148, 163, 184, 0.16);
        background: rgba(15, 23, 42, 0.76);
        box-shadow:
          0 24px 90px rgba(2, 6, 23, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .app-splash-brand {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        min-width: 0;
        margin-bottom: 22px;
      }

      .app-splash-logo {
        position: relative;
        flex: 0 0 auto;
        width: 64px;
        height: 64px;
        padding: 14px;
        box-sizing: border-box;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, rgba(129, 140, 248, 0.18), rgba(6, 182, 212, 0.16));
        border: 1px solid rgba(129, 140, 248, 0.2);
        box-shadow: 0 14px 32px rgba(79, 70, 229, 0.12);
      }

      .app-splash-logo::after {
        content: '';
        position: absolute;
        inset: -10px;
        border-radius: 26px;
        border: 1px solid rgba(129, 140, 248, 0.14);
      }

      .app-splash-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        animation: splash-float 3.6s ease-in-out infinite;
      }

      .app-splash-copy {
        min-width: 0;
      }

      .app-splash-kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #4338ca;
        background: rgba(99, 102, 241, 0.12);
      }

      html.dark .app-splash-kicker {
        color: #c7d2fe;
        background: rgba(99, 102, 241, 0.16);
      }

      .app-splash-title {
        margin: 0;
        font-size: clamp(24px, 3vw, 34px);
        line-height: 1.12;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0f172a;
      }

      .app-splash-title-mark {
        display: inline-block;
        margin-right: 2px;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      html.dark .app-splash-title {
        color: #e2e8f0;
      }

      .app-splash-subtitle {
        margin: 10px 0 0;
        font-size: 14px;
        line-height: 1.7;
        color: #475569;
      }

      html.dark .app-splash-subtitle {
        color: #94a3b8;
      }

      .app-splash-panel {
        border-radius: 22px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background: rgba(255, 255, 255, 0.52);
        padding: 20px 20px 18px;
      }

      html.dark .app-splash-panel {
        background: rgba(15, 23, 42, 0.46);
        border-color: rgba(148, 163, 184, 0.12);
      }

      .app-splash-panel-title {
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 700;
        color: #1e293b;
      }

      html.dark .app-splash-panel-title {
        color: #e2e8f0;
      }

      .app-splash-progress-track {
        position: relative;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.16);
      }

      .app-splash-progress-bar {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, #6366f1 0%, #22c55e 45%, #06b6d4 100%);
        transform-origin: left center;
        animation: splash-progress 2.4s ease-in-out infinite;
      }

      .app-splash-progress-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
        animation: splash-shimmer 1.8s linear infinite;
      }

      .app-splash-progress-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
        font-size: 12px;
        color: #64748b;
      }

      html.dark .app-splash-progress-meta {
        color: #94a3b8;
      }

      .app-splash-status-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 16px;
      }

      .app-splash-status-note {
        font-size: 12px;
        color: #64748b;
      }

      html.dark .app-splash-status-note {
        color: #94a3b8;
      }

      .app-splash-status-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: #334155;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(255, 255, 255, 0.7);
      }

      html.dark .app-splash-status-tag {
        color: #cbd5e1;
        border-color: rgba(148, 163, 184, 0.14);
        background: rgba(15, 23, 42, 0.42);
      }

      .app-splash-pulse {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, #22c55e, #06b6d4);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.28);
        animation: splash-pulse 1.8s ease-out infinite;
      }

      .app-splash-footer {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.12);
        font-size: 12px;
        color: #64748b;
      }

      html.dark .app-splash-footer {
        border-top-color: rgba(148, 163, 184, 0.1);
        color: #94a3b8;
      }

      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      @keyframes splash-progress {
        0% { transform: scaleX(0.2); opacity: 0.75; }
        50% { transform: scaleX(0.68); opacity: 1; }
        100% { transform: scaleX(0.94); opacity: 0.85; }
      }

      @keyframes splash-shimmer {
        from { transform: translateX(-100%); }
        to { transform: translateX(200%); }
      }

      @keyframes splash-pulse {
        0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.32); }
        70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
      }

      @keyframes splash-orbit {
        0% { transform: translate3d(0, 0, 0) scale(1); }
        100% { transform: translate3d(16px, -18px, 0) scale(1.06); }
      }

      @media (max-width: 760px) {
        .app-splash-shell {
          padding: 22px;
          border-radius: 24px;
        }

        .app-splash-brand {
          flex-direction: column;
          align-items: flex-start;
        }

        .app-splash-status-line {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #app-splash,
        #app-splash::before,
        #app-splash::after,
        .app-splash-logo svg,
        .app-splash-progress-bar,
        .app-splash-progress-bar::after,
        .app-splash-pulse {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <div class="app-splash-shell" aria-live="polite" aria-label="系统正在初始化">
        <div class="app-splash-brand">
          <div class="app-splash-logo" aria-hidden="true">
            <img src="/src/assets/images/logo.svg" alt="" />
          </div>
          <div class="app-splash-copy">
            
            <h1 class="app-splash-title"><span class="app-splash-title-mark">星枢</span>K8S管理平台</h1>
            <p class="app-splash-subtitle">正在安全加载集群视图、权限能力与运行数据，马上进入你的 K8S 工作台。</p>
          </div>
        </div>

        <section class="app-splash-panel">
          <h2 class="app-splash-panel-title">系统启动中</h2>
          <div class="app-splash-progress-track" aria-hidden="true">
            <div class="app-splash-progress-bar"></div>
          </div>
          <div class="app-splash-progress-meta">
            <span>正在连接路由与首屏资源</span>
            <span>请稍候…</span>
          </div>
          <div class="app-splash-status-line">
            
            <div class="app-splash-status-tag"><span class="app-splash-pulse" aria-hidden="true"></span> 系统启动中</div>
          </div>
        </section>


      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
