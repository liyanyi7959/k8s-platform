---
- name: Install application via docker-compose
  hosts: targets
  become: true
  gather_facts: false
  vars:
    app_name: "{{ app_name | default('app') }}"
    install_dir: "{{ install_dir | default('/opt/apps/' + app_name) }}"
    project_name: "{{ project_name | default(app_name) }}"
    compose_yaml: "{{ compose_yaml | default('') }}"
    env_content: "{{ env_content | default('') }}"
    pull_images: "{{ pull_images | default(true) }}"
    auto_install_docker: "{{ auto_install_docker | default(true) }}"
    auto_install_compose: "{{ auto_install_compose | default(true) }}"
  tasks:
    - name: Check docker exists
      shell: command -v docker >/dev/null 2>&1
      args:
        executable: /bin/sh
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Ensure curl or wget exists
      shell: |
        set -e
        if command -v curl >/dev/null 2>&1 || command -v wget >/dev/null 2>&1; then
          exit 0
        fi
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update -y
          apt-get install -y curl
          exit 0
        fi
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y curl
          exit 0
        fi
        if command -v yum >/dev/null 2>&1; then
          yum install -y curl
          exit 0
        fi
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache curl
          exit 0
        fi
        echo "no package manager to install curl"
        exit 2
      args:
        executable: /bin/sh
      when: docker_check.rc != 0 and (auto_install_docker | bool)
      changed_when: false

    - name: Install docker via get.docker.com
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1; then
          exit 0
        fi
        if command -v curl >/dev/null 2>&1; then
          curl -fsSL https://get.docker.com | sh
          exit 0
        fi
        if command -v wget >/dev/null 2>&1; then
          wget -qO- https://get.docker.com | sh
          exit 0
        fi
        echo "curl/wget not found"
        exit 2
      args:
        executable: /bin/sh
      when: docker_check.rc != 0 and (auto_install_docker | bool)

    - name: Re-check docker exists
      shell: command -v docker >/dev/null 2>&1
      args:
        executable: /bin/sh
      register: docker_check2
      changed_when: false
      failed_when: false

    - name: Fail if docker not found
      fail:
        msg: "docker not found"
      when: docker_check2.rc != 0

    - name: Ensure docker daemon started
      shell: |
        set -e
        if command -v systemctl >/dev/null 2>&1; then
          systemctl enable --now docker
          exit 0
        fi
        if command -v service >/dev/null 2>&1; then
          service docker start || true
          exit 0
        fi
        exit 0
      args:
        executable: /bin/sh
      changed_when: false

    - name: Ensure install dir exists
      file:
        path: "{{ install_dir }}"
        state: directory
        mode: "0755"

    - name: Write docker-compose.yml
      copy:
        dest: "{{ install_dir }}/docker-compose.yml"
        content: "{{ compose_yaml }}"
        mode: "0644"
      when: (compose_yaml | length) > 0

    - name: Write .env
      copy:
        dest: "{{ install_dir }}/.env"
        content: "{{ env_content }}"
        mode: "0644"
      when: (env_content | length) > 0

    - name: Detect docker compose command
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          echo "docker compose"
          exit 0
        fi
        if command -v docker-compose >/dev/null 2>&1; then
          echo "docker-compose"
          exit 0
        fi
        echo "missing"
        exit 2
      args:
        executable: /bin/sh
      register: compose_cmd
      changed_when: false
      failed_when: false

    - name: Install docker compose
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          exit 0
        fi
        if command -v docker-compose >/dev/null 2>&1; then
          exit 0
        fi
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update -y
          apt-get install -y docker-compose-plugin || apt-get install -y docker-compose
          exit 0
        fi
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y docker-compose-plugin || dnf install -y docker-compose
          exit 0
        fi
        if command -v yum >/dev/null 2>&1; then
          yum install -y docker-compose-plugin || yum install -y docker-compose
          exit 0
        fi
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache docker-cli-compose || true
        fi
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          exit 0
        fi
        if command -v curl >/dev/null 2>&1 || command -v wget >/dev/null 2>&1; then
          arch="$(uname -m | tr '[:upper:]' '[:lower:]')"
          if [ "$arch" = "x86_64" ] || [ "$arch" = "amd64" ]; then
            arch="x86_64"
          elif [ "$arch" = "aarch64" ] || [ "$arch" = "arm64" ]; then
            arch="aarch64"
          fi
          url="https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$arch"
          if command -v curl >/dev/null 2>&1; then
            curl -fsSL "$url" -o /usr/local/bin/docker-compose
          else
            wget -qO /usr/local/bin/docker-compose "$url"
          fi
          chmod +x /usr/local/bin/docker-compose
          exit 0
        fi
        echo "no supported method to install docker compose"
        exit 2
      args:
        executable: /bin/sh
      when: compose_cmd.stdout == "missing" and (auto_install_compose | bool)

    - name: Detect docker compose command after install
      shell: |
        set -e
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          echo "docker compose"
          exit 0
        fi
        if command -v docker-compose >/dev/null 2>&1; then
          echo "docker-compose"
          exit 0
        fi
        echo "missing"
        exit 2
      args:
        executable: /bin/sh
      register: compose_cmd2
      changed_when: false
      failed_when: false

    - name: Fail if docker compose not found
      fail:
        msg: "docker compose / docker-compose not found"
      when: compose_cmd2.stdout == "missing"

    - name: Pull images
      shell: "{{ compose_cmd2.stdout }} -p {{ project_name | quote }} pull"
      args:
        chdir: "{{ install_dir }}"
        executable: /bin/sh
      when: pull_images | bool

    - name: Up -d
      shell: "{{ compose_cmd2.stdout }} -p {{ project_name | quote }} up -d"
      args:
        chdir: "{{ install_dir }}"
        executable: /bin/sh

    - name: Show status
      shell: "{{ compose_cmd2.stdout }} -p {{ project_name | quote }} ps"
      args:
        chdir: "{{ install_dir }}"
        executable: /bin/sh
      register: ps_out
      changed_when: false

    - debug:
        msg: "{{ ps_out.stdout_lines }}"
