                  $ref: '#/definitions/k8s-platform-backend_internal_service.FileEntry'
              type: object
      security:
      - BearerAuth: []
      summary: 文件信息
      tags:
      - 服务器文件管理
  /servers/{id}/files/upload:
    post:
      parameters:
      - description: 服务器ID
        in: path
        name: id
        required: true
        type: integer
      - description: 远程目标路径
        in: formData
        name: path
        required: true
        type: string
      - description: 上传的文件
        in: formData
        name: file
        required: true
        type: file
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 上传文件
      tags:
      - 服务器文件管理
  /servers/{id}/files/write:
    put:
      parameters:
      - description: 服务器ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 写入远程文件
      tags:
      - 服务器文件管理
  /servers/{id}/stats:
    get:
      parameters:
      - description: 服务器ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
            - properties:
                data:
                  $ref: '#/definitions/k8s-platform-backend_internal_service.ServerStats'
              type: object
      security:
      - BearerAuth: []
      summary: 服务器实时指标
      tags:
      - 服务器监控
  /servers/{id}/sysinfo:
    get:
      parameters:
      - description: 服务器ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
            - properties:
                data:
                  $ref: '#/definitions/k8s-platform-backend_internal_service.ServerSysInfo'
              type: object
      security:
      - BearerAuth: []
      summary: 服务器系统信息
      tags:
      - 服务器监控
  /tasks:
    get:
      consumes:
      - application/json
      description: 分页列出任务，支持 type/status/keyword/created_by 过滤与排序
      parameters:
      - description: 页码
        example: 1
        in: query
        name: page
        type: integer
      - description: 每页条数
        example: 10
        in: query
        name: page_size
        type: integer
      - description: 任务类型
        example: cluster_create
        in: query
        name: type
        type: string
      - description: 任务状态
        example: running
        in: query
        name: status
        type: string
      - description: 关键字
        in: query
        name: keyword
        type: string
      - description: 创建者用户ID
        example: 1
        in: query
        name: created_by
        type: integer
      - description: 排序字段
        example: created_at
        in: query
        name: sort_by
        type: string
      - description: 排序方向
        example: desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
            - properties:
                data:
                  $ref: '#/definitions/internal_controller.TaskListPage'
              type: object
      security:
      - BearerAuth: []
      summary: 任务列表
      tags:
      - 任务中心接口
  /tasks/{id}:
    get:
      consumes:
      - application/json
      description: 根据任务 ID 查询任务详情（含步骤与进度）
      parameters:
      - description: 任务ID
        example: 9101
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
            - properties:
                data:
                  $ref: '#/definitions/k8s-platform-backend_internal_service.Task'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "404":
          description: 任务不存在
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 任务详情
      tags:
      - 任务中心接口
  /tasks/{id}/cancel:
    post:
      consumes:
      - application/json
      description: 将任务标记为已取消（仅对 pending/running 生效）
      parameters:
      - description: 任务ID
        example: 9101
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 取消成功
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "404":
          description: 任务不存在
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "409":
          description: 不可取消
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 取消任务
      tags:
      - 任务中心接口
  /tasks/{id}/logs:
    get:
      consumes:
      - application/json
      description: 分页获取任务日志行
      parameters:
      - description: 任务ID
        example: 9101
        in: path
        name: id
        required: true
        type: integer
      - description: 偏移量
        example: 0
        in: query
        name: offset
        type: integer
      - description: 返回行数
        example: 200
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
            - properties:
                data:
                  $ref: '#/definitions/internal_controller.TaskLogsResp'
              type: object
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "404":
          description: 任务不存在
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 任务日志
      tags:
      - 任务中心接口
  /users:
    get:
      consumes:
      - application/json
      description: 分页列出用户，支持 keyword/status 过滤与排序
      parameters:
      - description: 页码
        example: 1
        in: query
        name: page
        type: integer
      - description: 每页条数
        example: 10
        in: query
        name: page_size
        type: integer
      - description: 关键字（按用户名模糊搜索）
        in: query
        name: keyword
        type: string
      - description: 状态过滤
        example: active
        in: query
        name: status
        type: string
      - description: 排序字段
        example: created_at
        in: query
        name: sort_by
        type: string
      - description: 排序方向
        example: desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询失败
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 用户列表
      tags:
      - 用户与权限接口
    post:
      consumes:
      - application/json
      description: 创建用户并绑定角色
      parameters:
      - description: 创建参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controller.createUserReq'
      produces:
      - application/json
      responses:
        "200":
          description: 创建失败
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 创建用户
      tags:
      - 用户与权限接口
  /users/{id}:
    patch:
      consumes:
      - application/json
      description: 支持更新用户状态或角色绑定（部分字段更新）
      parameters:
      - description: 用户ID
        example: 1001
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 更新失败
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 更新用户
      tags:
      - 用户与权限接口
  /users/{id}/reset-password:
    post:
      consumes:
      - application/json
      description: 管理员重置指定用户密码
      parameters:
      - description: 用户ID
        example: 1001
        in: path
        name: id
        required: true
        type: integer
      - description: 重置参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_controller.resetPasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: 重置失败
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: 重置用户密码
      tags:
      - 用户与权限接口
  /ws/pod-exec:
    get:
      consumes:
      - application/json
      description: 通过 WebSocket 建立交互式 exec 通道（携带 session_id）
      parameters:
      - description: Exec 会话ID
        in: query
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 升级 WebSocket
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "404":
          description: 会话不存在
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: Pod Exec WebSocket
      tags:
      - WebSocket 接口
  /ws/pod-log:
    get:
      consumes:
      - application/json
      description: 通过 WebSocket 推送 Pod 日志（携带 session_id）
      parameters:
      - description: 日志会话ID
        in: query
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 升级 WebSocket
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "400":
          description: 参数错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "404":
          description: 会话不存在
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
        "500":
          description: 内部错误
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: Pod 日志 WebSocket
      tags:
      - WebSocket 接口
  /ws/ssh:
    get:
      consumes:
      - application/json
      description: 建立 SSH 终端 WebSocket 连接（需要 server_id、cols、rows）
      parameters:
      - description: 服务器ID
        example: 1001
        in: query
        name: server_id
        required: true
        type: integer
      - description: 终端列数
        example: 120
        in: query
        name: cols
        type: integer
      - description: 终端行数
        example: 36
        in: query
        name: rows
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 升级 WebSocket
          schema:
            $ref: '#/definitions/k8s-platform-backend_pkg_resp.Result'
      security:
      - BearerAuth: []
      summary: SSH WebSocket
      tags:
      - 服务器管理接口
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
