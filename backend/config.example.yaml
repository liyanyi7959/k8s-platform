server:
  addr: ":8080"
  gin_mode: "release"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"
  shutdown_timeout: "10s"
db:
  mysql_dsn: "root:Root@123@tcp(127.0.0.1:3306)/k8spaltform?charset=utf8mb4&parseTime=True&loc=Local"
migrate:
  auto: true
jwt:
  secret: "123456789qwertyuiopQWERTYUIOP"
  token_ttl: "168h"
auth:
  admin_username: "admin"
  admin_password: "admin"
# crypto.master_key 用于加密 kubeconfig 等敏感数据（AES-256-GCM）。
# 若不配置，则回退使用 jwt.secret（兼容旧版）。生产环境建议独立配置。
crypto:
  master_key: ""
redis:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  default_ttl: "20s"
log:
  level: "info"
  format: "json"
k8s:
  insecure_skip_tls_verify: false
